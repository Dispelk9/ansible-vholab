netbox_fqdn: "netbox.dispelk9.de"
netbox_enable_certbot: true
netbox_certbot_cloudflare_creds: "/root/.secrets/cloudflare.ini"

# If you want full automation (optional)
netbox_create_superuser: true
netbox_superuser_name: "admin"
netbox_superuser_email: "admin@dispelk9.de"
netbox_superuser_password: "ChangeMe123!"

# ---------------------------------------------------------------------------
# Diode server / NetBox Diode plugin / Orb Agent (netbox_discovery_deploy.yml)
#
# netbox_install_dir must match roles/netbox/defaults/main.yml's value -
# it's repeated here (rather than relied on implicitly) because
# netbox_deploy.yml and netbox_discovery_deploy.yml are separate plays, so
# one play's role defaults aren't visible to the other.
# ---------------------------------------------------------------------------
netbox_install_dir: /opt/netbox
netbox_compose_project_name: netbox-docker
docker_discovery_network_name: netbox_discovery_net

# diode_server_compose_ref is NOT overridden here - roles/diode_server/defaults/main.yml
# now pins it to a validated commit SHA (was "release", a floating branch
# ref - that drift is exactly what broke env.j2's variable names against
# what upstream's docker-compose.yaml actually expects). Re-pin there, not
# here, when you validate a newer ref.

# NOT 8080/8081 - both already bound on this host by unrelated containers
# (app-backend-1, app-frontend-1). See roles/diode_server/defaults/main.yml.
#
# Moved off 8180 (2026-07-15): after many rapid down/up cycles on that port
# during initial rollout, Docker's in-memory port-allocator got stuck
# reporting "port is already allocated" for it even with nothing actually
# listening (confirmed via `ss -ltnp`, iptables NAT table, and a live
# `docker compose up --force-recreate` reproduction) - a known class of
# Docker daemon bug where the allocator's bookkeeping desyncs from real
# socket/iptables state. Fixing it properly means restarting the Docker
# daemon, which isn't safe to do casually on this shared host (several
# other unrelated production containers have no restart policy and
# wouldn't come back on their own) - moving to a fresh, never-touched port
# sidesteps it with zero blast radius. Re-check with `ss -tlnp` before
# reusing 8180 again.
diode_nginx_bind_port: 8280

diode_plugin_version: "1.12.0"   # see roles/netbox_diode_plugin/defaults for why not the latest (1.14.0)

orb_image_tag: "2.11.0"

# Repeated from roles/orb_agent/defaults/main.yml: diode_server's
# client-credentials.json.j2 needs this to register Orb's ingest client in
# Hydra, but diode_server runs before orb_agent in
# netbox_discovery_deploy.yml, so orb_agent's own role defaults aren't
# loaded into the play yet when diode_server's templates render.
orb_diode_client_id: "orb-agent"

orb_discovery_targets:
  - "10.0.0.0/24"

# Default (skip_host: true) maps to nmap -Pn, which treats every address in
# a target CIDR as up and fully port-scans it regardless of whether
# anything is actually listening. Over a /24 that's 256 full port scans
# with no early-out, which blew through the policy's 5m timeout. Disabling
# it lets nmap ping-sweep first and skip dead addresses.
orb_discovery_skip_host: false

orb_dry_run: false