---
# This repo has no separate "detect existing install" role (unlike a
# from-scratch adoption scenario) - the netbox role in this same repo is
# what deployed the live instance, so we know the paths already.
#
# This file only does the safe, no-dependency setup (directory checks,
# backup plumbing). Detecting running services/image and asserting netbox
# is actually up live in detect_running_state.yml, which runs AFTER
# self_heal.yml - deliberately split apart so self_heal.yml can repair a
# crashed netbox (e.g. a bad configuration/plugins.py) before this role
# asserts netbox must already be healthy. See self_heal.yml for why that
# ordering matters.

- name: Assert netbox-docker directory exists
  ansible.builtin.stat:
    path: "{{ netbox_docker_dir }}"
  register: _netbox_dir_stat

- name: Fail if netbox-docker directory is missing
  ansible.builtin.assert:
    that: _netbox_dir_stat.stat.isdir | default(false)
    fail_msg: >-
      {{ netbox_docker_dir }} does not exist. Run netbox_deploy.yml (the
      existing netbox role) first, or fix netbox_install_dir if this host's
      layout differs from the default.

- name: Ensure backup directory exists
  ansible.builtin.file:
    path: "{{ netbox_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Record backup timestamp
  ansible.builtin.set_fact:
    netbox_backup_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
