---
# Provisions the Docker secret file the plugin reads its client secret from
# (its own documented default), so the value never has to sit in plaintext
# inside configuration/plugins.py.
#
# World-readable mode is deliberate, not an oversight - see
# docs/netbox-diode-secret-permission-bug.md. Standalone `docker compose`
# (non-Swarm) implements `secrets:` as a plain bind-mount of this exact host
# file/path into the container - it does NOT re-chown/re-permission it for
# the container's user namespace. The netbox/netbox-worker containers run
# as a non-root user (confirmed live: `docker compose exec netbox ...` as
# the default user got "Permission denied" against a 0600 root-owned copy
# of this same file), so root:root 0700/0600 made it unreadable by the
# process that actually needs it, every time, regardless of restarts - the
# exact same class of bug fixed for oauth2/client-credentials.json in
# roles/diode_server elsewhere in this repo, just not applied here yet.
- name: Ensure the secrets directory exists (world-traversable - see comment above)
  ansible.builtin.file:
    path: "{{ netbox_diode_build_dir }}/secrets"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write the netbox_to_diode client secret file (world-readable - see comment above)
  ansible.builtin.copy:
    content: "{{ netbox_to_diode_client_secret }}"
    dest: "{{ netbox_diode_build_dir }}/secrets/netbox_to_diode"
    owner: root
    group: root
    mode: "0644"
  no_log: true
