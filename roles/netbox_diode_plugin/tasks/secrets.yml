---
# Provisions the Docker secret file the plugin reads its client secret from
# (its own documented default), so the value never has to sit in plaintext
# inside configuration/plugins.py.

- name: Ensure the secrets directory exists (root-only)
  ansible.builtin.file:
    path: "{{ netbox_diode_build_dir }}/secrets"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Write the netbox_to_diode client secret file
  ansible.builtin.copy:
    content: "{{ netbox_to_diode_client_secret }}"
    dest: "{{ netbox_diode_build_dir }}/secrets/netbox_to_diode"
    owner: root
    group: root
    mode: "0600"
  no_log: true
