---
# The running image's tag (e.g. "v4.5-4.0.1") encodes netbox-docker's own
# release, not necessarily the exact NetBox core patch version. Query the
# running instance directly (NetBox's unauthenticated /api/status/) and
# fail fast, before building anything, if it's outside the range the pinned
# Diode plugin version declares support for.

- name: Query the running NetBox core version via /api/status/
  ansible.builtin.command: >
    docker compose exec -T netbox
    python3 -c "import json,urllib.request; print(json.load(urllib.request.urlopen('http://localhost:8080/api/status/'))['netbox-version'])"
  args:
    chdir: "{{ netbox_docker_dir }}"
  changed_when: false
  register: _netbox_core_version

- name: Assert the running NetBox core version is within the plugin's supported range
  ansible.builtin.assert:
    that:
      - _netbox_core_version.stdout | trim is version(diode_plugin_min_netbox_version, '>=')
      - _netbox_core_version.stdout | trim is version(diode_plugin_max_netbox_version, '<=')
    fail_msg: >-
      Running NetBox core version {{ _netbox_core_version.stdout | trim }} is outside
      the range Diode plugin {{ diode_plugin_version }} declares support for
      ({{ diode_plugin_min_netbox_version }} - {{ diode_plugin_max_netbox_version }}).
      Pick a plugin version whose netbox_diode_plugin/__init__.py min_version/
      max_version covers {{ _netbox_core_version.stdout | trim }} before continuing:
      https://github.com/netboxlabs/diode-netbox-plugin/releases
    success_msg: >-
      NetBox core {{ _netbox_core_version.stdout | trim }} is within the supported
      range for Diode plugin {{ diode_plugin_version }}.
