---
- name: Ensure netbox base directory exists
  ansible.builtin.file:
    path: "{{ netbox_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check whether netbox-docker is already a git checkout
  ansible.builtin.stat:
    path: "{{ netbox_install_dir }}/netbox-docker/.git"
  register: _netbox_docker_git_stat

- name: Clone netbox-docker repo (first-time only)
  ansible.builtin.git:
    repo: "{{ netbox_repo }}"
    dest: "{{ netbox_install_dir }}/netbox-docker"
    version: "{{ netbox_repo_branch }}"
  when: not _netbox_docker_git_stat.stat.exists

# This role's own "Generate secrets" block below rewrites env/*.env with
# real secrets every run, and netbox_diode_plugin (a separate playbook)
# modifies configuration/plugins.py in place - both are tracked files in
# netbox-docker's own git history. update:yes below refuses to touch a
# dirty working tree (force:no), so without marking these, any re-run
# fails outright on "Local modifications exist in repository" - confirmed
# live. git stash was tried first and made this WORSE, not better: this
# role's own secrets task rewrites env/netbox.env again after the stash
# pop, but by the time the stash is restored later it conflicts with that
# fresh rewrite of the SAME file ("Your local changes to ... env/netbox.env
# would be overwritten by merge") - also confirmed live. skip-worktree
# tells git to never compare or touch these specific files during
# pull/merge at all, so there's nothing left to conflict with; idempotent
# to (re)run every time.
- name: Mark files this role and netbox_diode_plugin customize in place as skip-worktree
  ansible.builtin.command:
    argv:
      - git
      - update-index
      - --skip-worktree
      - "{{ item }}"
  args:
    chdir: "{{ netbox_install_dir }}/netbox-docker"
  loop:
    - env/netbox.env
    - env/postgres.env
    - env/redis.env
    - env/redis-cache.env
    - configuration/plugins.py
  changed_when: false
  when: _netbox_docker_git_stat.stat.exists

- name: Update netbox-docker repo to the latest release
  ansible.builtin.git:
    repo: "{{ netbox_repo }}"
    dest: "{{ netbox_install_dir }}/netbox-docker"
    version: "{{ netbox_repo_branch }}"
    update: yes
  when: _netbox_docker_git_stat.stat.exists

# configuration/plugins.py keeps whatever it already had (skip-worktree
# means this pull never touched it) - including netbox_diode_plugin's
# customization, if that's ever run before. That's safe even though this
# role always runs NetBox on the plain upstream image (see the -f scoping
# on Pull images/Start NetBox stack, below) which never has that plugin
# package installed: plugins_block.py.j2 only registers the plugin in
# PLUGINS/PLUGINS_CONFIG if the package is actually importable, so it's a
# no-op here and load-bearing once netbox_discovery_deploy.yml swaps in the
# custom image.
- name: Write docker-compose.override.yml (bind NetBox locally)
  ansible.builtin.copy:
    dest: "{{ netbox_install_dir }}/netbox-docker/docker-compose.override.yml"
    owner: root
    group: root
    mode: "0644"
    content: |
      services:
        netbox:
          ports:
            - "{{ netbox_bind_ip }}:{{ netbox_bind_port }}:8080"
          healthcheck:
            interval: 10s
            timeout: 10s
            retries: 30
            start_period: 60s
        netbox-worker:
          healthcheck:
            interval: 10s
            timeout: 10s
            retries: 30
            start_period: 60s

# --- Secrets / env files ---
- name: Generate secrets (only if enabled)
  when: netbox_generate_secrets
  block:
    - name: Generate DB password if missing
      ansible.builtin.command: "openssl rand -base64 24"
      register: _dbpass
      changed_when: false

    - name: Generate redis password if missing
      ansible.builtin.command: "openssl rand -base64 24"
      register: _redis1
      changed_when: false

    - name: Generate redis-cache password if missing
      ansible.builtin.command: "openssl rand -base64 24"
      register: _redis2
      changed_when: false

    - name: Generate NetBox SECRET_KEY
      ansible.builtin.command: "openssl rand -base64 48"
      register: _secret
      changed_when: false

    - name: Generate API_TOKEN_PEPPER_1
      ansible.builtin.command: "openssl rand -base64 48"
      register: _pepper
      changed_when: false

    - name: Read existing env/postgres.env
      ansible.builtin.slurp:
        src: "{{ netbox_install_dir }}/netbox-docker/env/postgres.env"
      register: _postgres_env_raw

    - name: Read existing env/netbox.env
      ansible.builtin.slurp:
        src: "{{ netbox_install_dir }}/netbox-docker/env/netbox.env"
      register: _netbox_env_raw

    - name: Read existing env/redis.env
      ansible.builtin.slurp:
        src: "{{ netbox_install_dir }}/netbox-docker/env/redis.env"
      register: _redis_env_raw

    - name: Read existing env/redis-cache.env
      ansible.builtin.slurp:
        src: "{{ netbox_install_dir }}/netbox-docker/env/redis-cache.env"
      register: _rediscache_env_raw

    # Helper: ensure we DON'T overwrite if already set (so reruns are stable)
    - name: Decide DBPASS (keep existing if present)
      ansible.builtin.set_fact:
        netbox_dbpass: >-
          {{
            ((_postgres_env_raw.content | b64decode).splitlines()
              | select('match','^POSTGRES_PASSWORD=')
              | list | first | default('POSTGRES_PASSWORD=')
            ).split('=',1)[1]
            | default(_dbpass.stdout, true)
          }}

    - name: Decide REDIS passwords (keep existing if present)
      ansible.builtin.set_fact:
        netbox_redispass: >-
          {{
            ((_redis_env_raw.content | b64decode).splitlines()
              | select('match','^REDIS_PASSWORD=')
              | list | first | default('REDIS_PASSWORD=')
            ).split('=',1)[1]
            | default(_redis1.stdout, true)
          }}
        netbox_rediscachepass: >-
          {{
            ((_rediscache_env_raw.content | b64decode).splitlines()
              | select('match','^REDIS_PASSWORD=')
              | list | first | default('REDIS_PASSWORD=')
            ).split('=',1)[1]
            | default(_redis2.stdout, true)
          }}

    - name: Decide SECRET_KEY (keep existing if present)
      ansible.builtin.set_fact:
        netbox_secretkey: >-
          {{
            ((_netbox_env_raw.content | b64decode).splitlines()
              | select('match','^SECRET_KEY=')
              | list | first | default('SECRET_KEY=')
            ).split('=',1)[1]
            | default(_secret.stdout, true)
          }}

    - name: Decide PEPPER (keep existing if present)
      ansible.builtin.set_fact:
        netbox_pepper: >-
          {{
            ((_netbox_env_raw.content | b64decode).splitlines()
              | select('match','^API_TOKEN_PEPPER_1=')
              | list | first | default('API_TOKEN_PEPPER_1=')
            ).split('=',1)[1]
            | default(_pepper.stdout, true)
          }}

    - name: Ensure POSTGRES_PASSWORD set
      ansible.builtin.lineinfile:
        path: "{{ netbox_install_dir }}/netbox-docker/env/postgres.env"
        regexp: '^POSTGRES_PASSWORD='
        line: "POSTGRES_PASSWORD={{ netbox_dbpass }}"

    - name: Ensure NetBox DB + secrets set
      ansible.builtin.lineinfile:
        path: "{{ netbox_install_dir }}/netbox-docker/env/netbox.env"
        regexp: '^{{ item.key }}='
        line: "{{ item.key }}={{ item.value }}"
      loop:
        - { key: "DB_PASSWORD", value: "{{ netbox_dbpass }}" }
        - { key: "SECRET_KEY", value: "{{ netbox_secretkey }}" }
        - { key: "API_TOKEN_PEPPER_1", value: "{{ netbox_pepper }}" }
        - { key: "REDIS_PASSWORD", value: "{{ netbox_redispass }}" }
        - { key: "REDIS_CACHE_PASSWORD", value: "{{ netbox_rediscachepass }}" }
        # "netbox" (the bare container/service name) is required in addition
        # to the public FQDN - anything reaching NetBox via
        # http://netbox:8080/... on the shared discovery network (Diode's
        # reconciler calling back into the plugin API) sends that as its
        # Host header, and Django's ALLOWED_HOSTS check rejects anything not
        # in this list with a bare, unstyled 400 (DisallowedHost) before URL
        # routing even runs - confirmed live: diode-reconciler's calls to
        # /api/plugins/diode/default-branch/ 400'd with an empty body
        # exactly matching this, independent of the URL path being correct.
        - { key: "ALLOWED_HOSTS", value: "{{ netbox_fqdn }} localhost 127.0.0.1 netbox" }

    - name: Ensure redis passwords set
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        regexp: '^REDIS_PASSWORD='
        line: "REDIS_PASSWORD={{ item.pass }}"
      loop:
        - { path: "{{ netbox_install_dir }}/netbox-docker/env/redis.env", pass: "{{ netbox_redispass }}" }
        - { path: "{{ netbox_install_dir }}/netbox-docker/env/redis-cache.env", pass: "{{ netbox_rediscachepass }}" }

# --- Start NetBox ---
# Explicit -f flags, not bare `docker compose` - once netbox_discovery_deploy.yml
# (a separate playbook) has ever run, .env's COMPOSE_FILE points at a third
# file (docker-compose.diode.yml) that swaps netbox/netbox-worker onto a
# custom image built locally and never pushed anywhere. Bare `docker
# compose pull` picks that up from .env and fails outright trying to pull
# it from a registry - confirmed live ("pull access denied for
# netbox-diode-custom"). Explicit -f flags override .env's COMPOSE_FILE
# entirely, so this role only ever touches the two files it actually owns,
# regardless of what the discovery playbook has layered on top.
- name: Pull images
  ansible.builtin.command: docker compose -f docker-compose.yml -f docker-compose.override.yml pull
  args:
    chdir: "{{ netbox_install_dir }}/netbox-docker"

- name: Start NetBox stack
  ansible.builtin.command: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
  args:
    chdir: "{{ netbox_install_dir }}/netbox-docker"

# --- Optional: certbot DNS (Cloudflare) ---
- name: Issue LetsEncrypt cert for NetBox (DNS challenge)
  when: netbox_enable_certbot
  ansible.builtin.command: >
    certbot certonly --non-interactive --agree-tos -m {{ netbox_superuser_email | default('admin@localhost') }}
    --dns-cloudflare
    --dns-cloudflare-credentials {{ netbox_certbot_cloudflare_creds }}
    --dns-cloudflare-propagation-seconds {{ netbox_certbot_propagation_seconds }}
    --cert-name {{ netbox_fqdn }}
    --key-type {{ netbox_certbot_key_type }}
    -d {{ netbox_fqdn }}
  register: _certbot
  changed_when: "'Congratulations' in _certbot.stdout or 'successfully' in _certbot.stdout"
  failed_when: _certbot.rc != 0 and ('Certificate not yet due for renewal' not in _certbot.stdout)

# --- Nginx vhost ---
- name: Deploy nginx site for NetBox
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: "{{ netbox_nginx_site_available }}"
    owner: root
    group: root
    mode: "0644"
  notify: reload nginx

- name: Enable nginx site
  ansible.builtin.file:
    src: "{{ netbox_nginx_site_available }}"
    dest: "{{ netbox_nginx_site_enabled }}"
    state: link
  notify: reload nginx

- name: Validate nginx config
  ansible.builtin.command: nginx -t
  changed_when: false

