---
netbox_install_dir: /opt/netbox
orb_dir: "{{ netbox_install_dir }}/discovery/orb"
orb_compose_project_name: orb
orb_image: "netboxlabs/orb-agent"
orb_image_tag: "2.11.0"

orb_health_retries: 20
orb_health_delay: 5

# true (default/safe): agent.yaml sets backends.common.diode.dry_run: true,
# which writes discovered inventory as JSON files instead of calling Diode -
# target/client_id/secret are not required in this mode. Flip to false only
# after reviewing dry-run output.
orb_dry_run: true
orb_dry_run_output_dir: "/opt/orb/dry-run"

# Where Orb reaches Diode once orb_dry_run: false. Orb runs with
# network_mode: host (required for raw scanning - see docs), so it must
# address Diode via the host-published port, not a container name on the
# shared bridge network. Must match diode_server's diode_nginx_bind_port
# (8280 on this host - see roles/diode_server/defaults/main.yml).
diode_nginx_bind_ip: "127.0.0.1"
diode_nginx_bind_port: 8280
orb_diode_client_id: "orb-agent"

# Discovery target(s) for the network_discovery backend's default policy.
#
# UNSET FOR THIS HOST ON PURPOSE - the live host (188.245.69.219) is a
# public Hetzner VPS; there's no private LAN/vSwitch visible from its own
# `docker ps -a` to infer a sane default from, and scan-target selection has
# real legal/AUP implications (scanning ranges you don't control can violate
# your hosting provider's terms). This is deliberately a non-routable
# RFC 5737 placeholder, not a guess - replace with the actual network(s) you
# have permission to scan before flipping orb_dry_run to false.
orb_discovery_targets:
  - "192.0.2.0/24"
orb_discovery_schedule: "*/15 * * * *"
# Minutes. Upstream's own default (5) is tight for a /24 even with
# skip_host: false's ping-sweep early-out - give it headroom.
orb_discovery_timeout: 15
orb_discovery_scan_types:
  - connect
orb_discovery_skip_host: true
orb_discovery_fast_mode: false

# snmp_discovery backend's policy - same target subnet as network_discovery
# above (reused directly in agent.yaml.j2, not a separate targets var), but
# its own cron schedule and its own timeout units. Device/interface/VLAN
# inventory changes far less often than open ports do, hence the longer
# 6h schedule rather than reusing orb_discovery_schedule.
#
# timeout here is in SECONDS (this backend's own field), NOT minutes like
# orb_discovery_timeout above for network_discovery - different backend,
# different units, do not conflate the two.
orb_snmp_schedule: "0 */6 * * *"
orb_snmp_timeout: 300

# orb_snmp_username / orb_snmp_auth_protocol / orb_snmp_priv_protocol /
# orb_snmp_port / orb_snmp_auth_passphrase / orb_snmp_priv_passphrase are
# NOT defaulted here - they're shared with roles/snmp_agent (which
# provisions this exact SNMPv3 user on vhohetzner1/vhohetzner2) and live in
# group_vars/Hetzner/vars.yml + group_vars/Hetzner/vault.yml. See
# roles/snmp_agent/defaults/main.yml for why.
