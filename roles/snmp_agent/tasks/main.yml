---
- name: Assert required SNMPv3 vault secrets are present
  ansible.builtin.assert:
    that:
      - orb_snmp_auth_passphrase is defined
      - orb_snmp_auth_passphrase != "CHANGE-ME"
      - orb_snmp_auth_passphrase | length >= 8
      - orb_snmp_priv_passphrase is defined
      - orb_snmp_priv_passphrase != "CHANGE-ME"
      - orb_snmp_priv_passphrase | length >= 8
      - snmp_agent_bind_ip is defined
    fail_msg: >-
      Copy group_vars/Hetzner/vault.yml.example to
      group_vars/Hetzner/vault.yml, fill in real (>=8 char) passphrases, and
      encrypt it with `ansible-vault encrypt group_vars/Hetzner/vault.yml` -
      or snmp_agent_bind_ip is missing from this host's host_vars (must be
      its own private-network IP, e.g. host_vars/vhohetzner1/vars.yml).
  no_log: true

- name: Install net-snmp agent
  ansible.builtin.apt:
    name: snmpd
    state: present
    update_cache: true

- name: Check whether the SNMPv3 user is already provisioned
  # Matches on a bare `usmUser` line, not the username itself: net-snmp
  # persists the localized entry with the security name hex-encoded (e.g.
  # 0x6f72622d... for "orb-discovery"), never as literal quoted text, so a
  # literal-text grep for the username always reports "not provisioned" even
  # after a successful localization - discovered live, see docs/ for the
  # full story. This role only ever provisions one user, so "does a usmUser
  # line exist at all" is an equally valid, encoding-agnostic proxy.
  ansible.builtin.command: >-
    grep -q '^usmUser ' /var/lib/snmp/snmpd.conf
  register: _snmp_user_check
  changed_when: false
  failed_when: false

- name: Stop snmpd before provisioning a new SNMPv3 user
  ansible.builtin.systemd:
    name: snmpd
    state: stopped
  when: _snmp_user_check.rc != 0

# Path is /var/lib/snmp/snmpd.conf - NOT /var/lib/snmpd/ (no trailing "d" on
# the directory). net-snmp's actual persistent directory (confirmed live via
# `snmpd -DALL`: "persistent path:/var/lib/snmp") is a different path from
# both /etc/snmp/snmpd.conf (the static ACL file below) and the superficially
# similar /var/lib/snmpd/ - writing there is a silent no-op: snmpd never
# reads that directory at all, so a createUser line placed there sits
# forever un-processed and every query fails "Unknown user name", no matter
# how many times snmpd is restarted or what the file's permissions are (hit
# live, cost a full debugging session on both hosts before `snmpd -DALL`
# surfaced the real path it was actually using). No owner/group/mode is set
# here deliberately - /var/lib/snmp is created and permissioned correctly by
# the snmpd package itself (confirmed live: the running Debian-snmp process
# already reads/rewrites this exact file successfully), so managing
# ownership here risks re-breaking access rather than fixing anything.
- name: Provision the SNMPv3 user (net-snmp encrypts this in place on next start)
  ansible.builtin.lineinfile:
    path: /var/lib/snmp/snmpd.conf
    create: true
    line: >-
      createUser {{ orb_snmp_username }} {{ orb_snmp_auth_protocol }}
      "{{ orb_snmp_auth_passphrase }}" {{ orb_snmp_priv_protocol }}
      "{{ orb_snmp_priv_passphrase }}"
  when: _snmp_user_check.rc != 0
  no_log: true

- name: Template snmpd.conf (bind address + access control - no secrets in here)
  ansible.builtin.template:
    src: snmpd.conf.j2
    dest: /etc/snmp/snmpd.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart snmpd

- name: Ensure snmpd is enabled and running
  ansible.builtin.systemd:
    name: snmpd
    state: started
    enabled: true
