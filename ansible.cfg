[defaults]
inventory   = ./inventory
roles_path  = ./roles
log_path    = /tmp/ansible.log
# Local, git-ignored file (see .gitignore) containing the vault password in
# plaintext - lets every ansible-playbook/ansible-vault command skip
# --ask-vault-pass. Create it yourself (never paste the actual password
# into a chat/AI session): `echo 'your-password' > .vault_pass && chmod 600 .vault_pass`
vault_password_file = .vault_pass
[ssh_connection]
ssh_args=-o ForwardAgent=yes